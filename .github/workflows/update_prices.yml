name: Update HDD Prices Report

on:
  schedule:
    # Runs at 08:00 UTC every day (adjust as needed)
    # Use https://crontab.guru to help create cron expressions
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest # Use a Linux runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Fetches your repository code

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Or your preferred Python version (e.g., 3.9, 3.11)

      - name: Install Firefox ESR (Extended Support Release) for Selenium
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox-esr # Installs Firefox

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the scraper script
        run: python hdd_price_scraper.py # Replace with your script's actual filename

      - name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]' # Bot committer name
          git config --global user.email 'github-actions[bot]@users.noreply.github.com' # Bot committer email
          git add pages/hdd_prices_report.html # Stage the generated HTML file
          # Check if there are changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "Automated update: HDD Prices Report"
            git push
          else
            echo "No changes to commit."
          fi
        env:
          # This token is automatically provided by GitHub Actions
          # It has permissions to push to the repository that triggered the action.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
