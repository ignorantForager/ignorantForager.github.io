<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device=width, initial-scale=1.0">
    <title>2023 Top Fantasy Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1f1f1f;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
            font-size: 24px;
            border-bottom: 2px solid #333;
        }
        table {
            width: 100%;
            margin: 20px 0;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            border: 1px solid #333;
            text-align: left;
        }
        th {
            background-color: #2c2c2c;
        }
        td {
            background-color: #1e1e1e;
        }
        .progress-bar-container {
            background-color: #333;
            border-radius: 5px;
            position: relative;
            height: 20px;
            width: 100%;
        }
        .progress-bar {
            height: 20px;
            border-radius: 5px;
        }
        .progress-bar.in-progress { background-color: #f1c40f; }
        .progress-bar.completed { background-color: #2ecc71; }
        .progress-bar.not-started { background-color: #e74c3c; }
    </style>
</head>
<body>

<header>2023 Top Fantasy Tracker</header>

<table id="trackerTable">
    <thead>
        <tr>
            <th>#</th>
            <th>Series</th>
            <th>Author</th>
            <th>Reading Status</th>
            <th>Series Status</th>
            <th>Total # of Books</th>
            <th>Total # of Books Read</th>
            <th>Progress</th>
            <th>Title of Next Read</th>
            <th>Next Book Status</th>
            <th>Notes</th>
        </tr>
    </thead>
    <tbody>
        <!-- Rows will be populated here -->
    </tbody>
</table>

<script>
    fetch('top_fantasy_tracker.csv')
    .then(response => response.text())
    .then(text => {
        const data = parseCSV(text);
        populateTable(data);
    });

    function parseCSV(csv) {
        const lines = csv.split("\\n");
        lines.shift(); // Remove header line
        return lines.map(line => {
            const cells = line.split(",");
            return cells;
        });
    }

    function populateTable(data) {
        const table = document.getElementById('trackerTable').getElementsByTagName('tbody')[0];
        data.forEach(row => {
            const newRow = table.insertRow();
            row.forEach((cell, index) => {
                const newCell = newRow.insertCell();
                if (index === 7) { // Special handling for progress bar
                    const progressBarContainer = document.createElement('div');
                    progressBarContainer.className = 'progress-bar-container';
                    progressBarContainer.title = cell + '%';
                    const progressBar = document.createElement('div');
                    progressBar.className = `progress-bar ${cell > 0 ? (cell < 100 ? 'in-progress' : 'completed') : 'not-started'}`;
                    progressBar.style.width = cell + '%';
                    progressBarContainer.appendChild(progressBar);
                    newCell.appendChild(progressBarContainer);
                } else {
                    newCell.textContent = cell;
                }
            });
        });
    }
</script>

</body>
</html>
