<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        main {
            padding: 2rem 0;
        }
        .content {
            background: #fff;
            padding: 2rem;
            margin: 1rem 0;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Sample Webpage</h1>
    </header>
    <div class="container">
        <main>
            <div class="content">
                <h2>About This Page</h2>
                <p>This is a simple example of an HTML webpage. It includes a header, main content area, and footer.</p>
                <a href="/books/index.html">Books!</a>
            </div>
            <div class="content">
                <h2>Contact</h2>
                <p>If you have any questions, please reach out via email at <a href="mailto:example@example.com">contact@ignorantforager.com</a>.</p>
            </div>
        </main>
    </div>
    <footer>
        <p>&copy; 2024 Your Name. All rights reserved.</p>
    </footer>
</body>
</html>
